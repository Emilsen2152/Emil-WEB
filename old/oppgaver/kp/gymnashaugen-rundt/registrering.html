<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gymnashaugen Rundt</title>
    <style>
        :root {
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --danger: #dc3545;
            --danger-hover: #bb2d3b;
            --text: #143552;
            --muted: #6b7f92;
            --border: #dee2e6;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .admin-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: var(--text); }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-row { display: flex; gap: 10px; margin-top: 30px; }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save { background: var(--accent); color: white; }
        .btn-save:hover { background: var(--accent-hover); }

        .btn-delete { 
            background: var(--danger); 
            color: white; 
            display: none; /* Skjult som standard */
        }
        .btn-delete:hover { background: var(--danger-hover); }

        .btn-lookup { background: var(--bg); color: var(--text); border: 2px solid var(--border); }

        #statusMsg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>Administrer Deltakar</h1>
    <p>Søk, endre eller slett deltakarar frå lista.</p>

    <div class="form-group">
        <label for="nr">Startnummer</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="nr" placeholder="Eks: 42">
            <button class="btn-lookup" onclick="lookupParticipant()" style="flex: 0 0 auto; width: auto; padding: 0 20px;">Sjekk</button>
        </div>
    </div>

    <div class="form-group">
        <label for="navn">Fullt navn</label>
        <input type="text" id="navn" placeholder="Ola Nordmann">
    </div>

    <div class="form-group">
        <label for="lag">Bedrift / Klasse / Annet</label>
        <input type="text" id="lag" placeholder="Bedrift / Klasse navn">
    </div>

    <div class="btn-row">
        <button id="deleteBtn" class="btn-delete" onclick="deleteParticipant()">Slett</button>
        <button class="btn-save" onclick="saveParticipant()">Lagre info</button>
    </div>

    <div id="statusMsg"></div>
</div>

<script>
    const statusMsg = document.getElementById('statusMsg');
    const deleteBtn = document.getElementById('deleteBtn');
    let participantExists = false;

    function showStatus(text, isSuccess) {
        statusMsg.textContent = text;
        statusMsg.style.display = 'block';
        statusMsg.style.backgroundColor = isSuccess ? '#d1e7dd' : '#f8d7da';
        statusMsg.style.color = isSuccess ? '#0f5132' : '#842029';
    }

    async function lookupParticipant() {
        const nr = document.getElementById('nr').value;
        if (!nr) return;

        try {
            const res = await fetch(`deltakere/get.php?nr=${nr}`);
            const json = await res.json();

            if (json.data) {
                document.getElementById('navn').value = json.data.navn;
                document.getElementById('lag').value = json.data.lag;
                participantExists = true;
                deleteBtn.style.display = 'block'; // Vis slett-knappen
                showStatus("Deltakar funne.", true);
            } else {
                participantExists = false;
                deleteBtn.style.display = 'none'; // Skjul slett-knappen
                document.getElementById('navn').value = "";
                document.getElementById('lag').value = "";
                showStatus("Startnummeret er ledig.", true);
            }
        } catch (e) {
            showStatus("Kunne ikkje hente data.", false);
        }
    }

    async function saveParticipant() {
        const data = {
            nr: document.getElementById('nr').value,
            navn: document.getElementById('navn').value,
            lag: document.getElementById('lag').value
        };

        const endpoint = participantExists ? 'deltakere/patch.php' : 'deltakere/post.php';
        
        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                showStatus("Lagra!", true);
                lookupParticipant(); // Oppdaterer status og knappar
            }
        } catch (e) {
            showStatus("Kunne ikkje lagre.", false);
        }
    }

    async function deleteParticipant() {
        const nr = document.getElementById('nr').value;
        if (!confirm(`Er du sikker på at du vil slette startnummer ${nr}?`)) return;

        try {
            const res = await fetch('deltakere/delete.php', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nr: nr })
            });
            const result = await res.json();

            if (result.success) {
                showStatus("Deltakar sletta.", true);
                // Nullstill skjema
                document.getElementById('nr').value = "";
                document.getElementById('navn').value = "";
                document.getElementById('lag').value = "";
                deleteBtn.style.display = 'none';
                participantExists = false;
            } else {
                showStatus("Kunne ikkje slette: " + result.message, false);
            }
        } catch (e) {
            showStatus("Feil ved sletting.", false);
        }
    }
</script>

</body>
</html>
