<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gymnashaugen rundt - Innsamling</title>

    <style>
        :root {
            --bg: rgba(255, 255, 255, 0.92);
            --border: rgba(255, 255, 255, 0.55);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
            --text: #143552;
            --muted: #6b7f92;
            --accent: #d00000;
            --danger: #dc3545;
            --danger-dark: #b02a37;
            --warning: #fd7e14;
            --success: #20c997;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .wrap {
            width: 100%;
            max-width: 1920px;
        }

        .card {
            position: relative;
            width: 100%;
            border-radius: 26px;
            padding: 22px 34px;
            background:
                radial-gradient(circle at top right, rgba(13, 110, 253, 0.08), transparent 26%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.97), rgba(246, 250, 255, 0.92));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

        .card.final-countdown {
            box-shadow:
                0 0 0 2px rgba(220, 53, 69, 0.18),
                0 12px 36px rgba(220, 53, 69, 0.18);
            background:
                radial-gradient(circle at top right, rgba(220, 53, 69, 0.12), transparent 26%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 245, 246, 0.95));
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 14px;
        }

        .eyebrow {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            transition: color 0.2s ease;
        }

        .title {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text);
        }

        .meta {
            font-size: 1rem;
            font-weight: 700;
            color: var(--muted);
        }

        .divider {
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), #ff7a7a);
            margin-bottom: 16px;
            transition: background 0.2s ease;
        }

        .countdown-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            min-height: 96px;
            font-size: 5rem;
            font-weight: 900;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--muted);
        }

        .sep {
            font-size: 3rem;
            color: #a8bbcf;
            line-height: 1;
        }

        .footer {
            margin-top: 10px;
            text-align: center;
            font-weight: 700;
            color: var(--muted);
            min-height: 1.5em;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card" id="card">

            <div class="topbar">
                <div>
                    <!-- <p class="eyebrow">Innsamling</p> -->
                    <h1 class="title">Gymnasrussen har samla inn</h1>
                </div>
                <!-- <div class="meta">8. april 2026 kl. 14:45</div> -->
            </div>

            <div class="divider"></div>

            <div class="countdown-row">
                Inntil <span id="innsamlings-verdi">0 kr!</span>
            </div>

            <div class="footer" id="footerText">Samla inn frå Gymnashaugen rundt + bøsseaksjon</div>
        </div>
    </div>

    <script>
        const verdiEl = document.getElementById("innsamlings-verdi");
        const waitSeconds = 2;
        const renderSeconds = 3;
        const innsamla = 300000;

        function renderNumber() {
            // Tallet går opp som i ein animasjon frå 0 til innsamla på renderSeconds sekund
            const startTime = performance.now();
            function animate() {
                const elapsed = performance.now() - startTime;
                const progress = Math.min(elapsed / (renderSeconds * 1000), 1);
                const currentValue = Math.floor(progress * innsamla);
                verdiEl.textContent = currentValue.toLocaleString("no-NO") + " kr!";

                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }

        setTimeout(() => {
            renderNumber();
        }, waitSeconds * 1000);
    </script>
</body>

</html>
